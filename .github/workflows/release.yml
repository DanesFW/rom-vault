name: Release

# Runs when you push a tag like v1.0.0
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: ''
          - platform: ubuntu-22.04
            args: ''
          - platform: macos-latest
            args: '--target universal-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # Universal macOS binary supports both Intel and Apple Silicon
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ROM Vault ${{ github.ref_name }}
          releaseBody: |
            ## Downloads

            | Platform | File |
            |----------|------|
            | Windows  | `ROM Vault_*_x64-setup.exe` |
            | Linux    | `rom-vault_*_amd64.AppImage` |
            | macOS    | `ROM Vault_*_universal.dmg` |

            **macOS note:** Right-click the `.dmg` and choose Open the first time — Apple blocks unsigned apps by default.
          releaseDraft: true
          args: ${{ matrix.args }}
